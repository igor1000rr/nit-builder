name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --coverage

      - name: Upload coverage report
        if: always()
        # v7: Node 24 runtime — устраняет deprecation warning для Node 20
        # actions, которые отключаются на runners в сентябре 2026.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Build
        run: npm run build
