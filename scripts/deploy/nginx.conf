# NIT Builder v2.0 — Single source of truth для production nginx.
#
# Раньше было два конфига (scripts/nginx.nit.vibecoding.by.conf и этот) —
# расходились в SSL, security headers, location-блоках. Объединены в один.
#
# Deploy:
#   scp scripts/deploy/nginx.conf root@<vps>:/etc/nginx/sites-available/nit.vibecoding.by
#   ssh root@<vps> 'ln -sfn /etc/nginx/sites-available/nit.vibecoding.by /etc/nginx/sites-enabled/'
#   ssh root@<vps> 'nginx -t && systemctl reload nginx'
#
# Первый раз (получить SSL):
#   ssh root@<vps>
#   certbot --nginx -d nit.vibecoding.by
#   # certbot подставит ssl_* пути сам — после его работы заберите дифф обратно в git
#
# Критичные моменты:
# - proxy_buffering off на /api/(tunnel|control) — иначе nginx режет
#   idle WebSocket через ~75 сек даже при live heartbeat
# - X-Forwarded-For проставляется обязательно — server.ts использует его
#   для rate-limit/guest-quota (с TRUSTED_PROXY_IPS=127.0.0.1 в .env)
# - Static-файлы НЕ обслуживаются nginx напрямую — server.ts уже отдаёт
#   /assets/* с Cache-Control immutable. Двойная раздача приводит к
#   рассинхрону MIME и Cache-Control между nginx и Node.

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nit.vibecoding.by;

    # Let's Encrypt webroot challenge — оставляем доступным по http
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main server ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nit.vibecoding.by;

    # SSL — managed by Certbot. После запуска `certbot --nginx -d ...`
    # пути могут отличаться — синхронизируйте сюда.
    ssl_certificate     /etc/letsencrypt/live/nit.vibecoding.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nit.vibecoding.by/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers — частично дублируют entry.server.tsx applySecurityHeaders().
    # Дублирование намеренное: nginx-level гарантирует header даже если SSR упал
    # и отдаётся 502. `always` — посылать на любых статусах.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Сохраняемые HTML до 1 MB (api.sites POST). Запас 2× на JSON-overhead.
    client_max_body_size 2M;

    # Gzip — для текстовых ответов. Бинарь типа /assets/*.woff2 уже сжат.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Logs (rotate via /etc/logrotate.d/nginx)
    access_log /var/log/nginx/nit.vibecoding.by.access.log;
    error_log  /var/log/nginx/nit.vibecoding.by.error.log warn;

    # ─── WebSocket: tunnel + control ──────────────────────────────
    # КРИТИЧНО: proxy_buffering off + длинные таймауты, иначе idle WS
    # режется через ~75с даже при live heartbeat от клиента.
    location ~ ^/api/(tunnel|control)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_buffering off;
        proxy_cache off;

        # Tunnels persistent: minutes to hours. Heartbeat ~30s.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ─── SSE streaming endpoint (HTTP fallback для generation) ────
    location /api/pipeline/simple {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # SSE — стримим как WebSocket, но без upgrade
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering "no";

        # 5 мин на самую долгую генерацию (длинный шаблон + 7B модель)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Всё остальное — React Router SSR ─────────────────────────
    # server.ts сам обслуживает /assets/* (immutable) и static
    # из public/. Никаких отдельных location для статики — иначе
    # рассинхрон Cache-Control между nginx и Node.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_cache off;
    }
}
