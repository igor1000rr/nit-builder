# /etc/nginx/sites-enabled/nit.vibecoding.by
#
# Главное: на /api/tunnel и /api/control — proxy_buffering off.
# Без этого WS-соединение рубится через ~75с даже при live heartbeat.
# server-side ws.ping() теперь тоже есть, но buffering off — обязательно.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # TODO: включить после DNS + LE:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/nit.vibecoding.by/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nit.vibecoding.by/privkey.pem;

    client_max_body_size 20M;

    # WebSocket endpoints — tunnel + control
    location ~ ^/api/(tunnel|control)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Критично: без этого nginx буферизует фреймы и режет idle connection
        proxy_buffering off;
        proxy_request_buffering off;

        # Долгие стримы
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # Всё остальное — обычный HTTP прокси
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
