# NIT Builder v2.0 Nginx config
# Deploy to: /etc/nginx/sites-available/nit.vibecoding.by
# Enable:    ln -s /etc/nginx/sites-available/nit.vibecoding.by /etc/nginx/sites-enabled/
# SSL:       certbot --nginx -d nit.vibecoding.by
# Reload:    nginx -t && systemctl reload nginx

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect (Certbot will add this block)
server {
    listen 80;
    listen [::]:80;
    server_name nit.vibecoding.by;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nit.vibecoding.by;

    # SSL — managed by Certbot (adjust paths if Certbot used different names)
    ssl_certificate     /etc/letsencrypt/live/nit.vibecoding.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nit.vibecoding.by/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size (accommodate HTML saves up to 1 MB)
    client_max_body_size 2M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Log (rotate via logrotate)
    access_log /var/log/nginx/nit.vibecoding.by.access.log;
    error_log  /var/log/nginx/nit.vibecoding.by.error.log warn;

    # WebSocket endpoints — no buffering, long timeouts
    location ~ ^/api/(tunnel|control)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # No buffering for streaming
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts — tunnel connections are persistent (minutes to hours)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # SSE streaming endpoint (HTTP fallback for generation)
    location /api/pipeline/simple {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # No buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering "no";

        # 5 minute timeout for long generations
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # All other routes → React Router app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Don't cache dynamic pages by default (React Router handles its own caching)
        proxy_cache off;
    }

    # Static assets — aggressive caching
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
