<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIT Tunnel</title>
    <style>
      :root {
        --bg: #020617;
        --surface: #0f172a;
        --border: #1e293b;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      body {
        overflow: hidden;
        user-select: none;
      }

      input, textarea, button {
        font: inherit;
        color: inherit;
      }

      input, textarea {
        user-select: text;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
